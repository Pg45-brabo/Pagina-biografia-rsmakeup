<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | R&S Makeup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #f4d9d4;
            --gold: #d4af37;
            --white: #ffffff;
        }
        body {
            background: linear-gradient(135deg, var(--blush) 0%, #ffffff 100%);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .input-group { margin-bottom: 24px; }
        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #666;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.8);
            transition: all 0.3s ease;
            outline: none;
        }
        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }
        .btn-save {
            background: var(--gold);
            color: white;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4);
        }
        .btn-save:active { transform: scale(0.98); }
        .success-msg {
            display: none;
            color: #2ecc71;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 15px;
            font-weight: 600;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #888;
            text-decoration: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1 class="serif text-3xl mb-8 text-center" style="color: #444;">Painel Administrativo</h1>
        
        <div class="input-group">
            <label>WhatsApp (Ex: 5531999999999)</label>
            <input type="text" id="wpp-number" placeholder="55...">
        </div>
        <div class="input-group">
            <label>Link da Loja / Catálogo</label>
            <input type="url" id="store-link" placeholder="https://...">
        </div>
        <div class="input-group">
            <label>Link do TikTok</label>
            <input type="url" id="tiktok-link" placeholder="https://...">
        </div>
        <button class="btn-save" onclick="saveData()">Salvar Alterações</button>
        
        <p id="success-msg" class="success-msg">✅ Alterações salvas com sucesso!</p>
        <a href="index.html" class="back-link">← Voltar para a Bio</a>
    </div>
    <script>
        // Carregar dados existentes
        window.onload = () => {
            document.getElementById('wpp-number').value = localStorage.getItem('rs_wpp') || '';
            document.getElementById('store-link').value = localStorage.getItem('rs_store_link') || '';
            document.getElementById('tiktok-link').value = localStorage.getItem('rs_tiktok_link') || '';
        };
        function saveData() {
            const wpp = document.getElementById('wpp-number').value;
            const store = document.getElementById('store-link').value;
            const tiktok = document.getElementById('tiktok-link').value;
            localStorage.setItem('rs_wpp', wpp);
            localStorage.setItem('rs_store_link', store);
            localStorage.setItem('rs_tiktok_link', tiktok);
            const msg = document.getElementById('success-msg');
            msg.style.display = 'block';
            
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
