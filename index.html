<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&S Makeup | Link in Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #f4d9d4;
            --gold: #d4af37; 
            --gold-light: #f9e498;
            --gold-dark: #b8860b;
            --black: #1a1a1a;
        }
        body {
            background-color: var(--blush);
            font-family: 'Montserrat', sans-serif;
            color: var(--black);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Container de Animação Unicorn Studio */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: -2;
            width: 100%;
            height: 100vh;
        }
        /* Overlay para legibilidade */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(244, 217, 212, 0.45);
            backdrop-filter: blur(3px);
        }
        .serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .main-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 60px 24px;
            text-align: center;
        }
        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 35px rgba(0,0,0,0.06);
            padding: 10px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .logo-container img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 50%;
        }
        .brand-name {
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .bio {
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 48px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        /* Botão Dourado com efeito de luz */
        .link-card {
            position: relative;
            padding: 16px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--gold);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(184, 134, 11, 0.25);
        }
        /* O brilho animado */
        .link-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                transparent, 
                rgba(255, 255, 255, 0.9), 
                transparent,
                transparent
            );
            animation: rotate 3s linear infinite;
            z-index: 1;
        }
        /* O fundo metálico do botão */
        .link-card::after {
            content: '';
            position: absolute;
            inset: 2px; 
            background: linear-gradient(135deg, #d4af37 0%, #f9e498 50%, #b8860b 100%);
            border-radius: 50px;
            z-index: 2;
        }
        .btn-content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
            padding: 0 40px;
        }
        .icon-box {
            position: absolute;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .link-card:active {
            transform: scale(0.95);
        }
        .gold-accent {
            color: var(--gold-dark);
        }
        .footer {
            margin-top: 60px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.5;
            padding-bottom: 40px;
        }
        .icon-svg {
            fill: #fff;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
            width: 20px;
            height: 20px;
        }
        @media (min-width: 768px) {
            .link-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 30px rgba(184, 134, 11, 0.4);
            }
        }
    </style>
</head>
<body>
    <!-- Camada de Animação Unicorn Studio -->
    <div id="bg-container">
        <div style="width: 100%; height: 100%;" data-us-project="uMMAALLJEry69MoLqdJS"></div>
    </div>
    <!-- Overlay de Legibilidade -->
    <div class="bg-overlay"></div>
    <!-- Conteúdo Principal -->
    <div class="main-wrapper">
        <div class="container">
            
            <div class="logo-container">
                <img src="https://i.postimg.cc/rmd8bnBB/LOGO-RS-MAKEUP.png" alt="R&S Makeup Logo">
            </div>
            <h1 class="brand-name serif">R&S Makeup</h1>
            <p class="bio">Beleza simples. Resultado elegante <span class="gold-accent">✨</span></p>
            <!-- Secção de Links -->
            <div class="links-wrapper">
                
                <a href="#" id="btn-loja" class="link-card">
                    <span class="btn-content">
                        <span class="icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24">
                                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                            </svg>
                        </span>
                        <span>Loja / Catálogo</span>
                    </span>
                </a>
                <a href="#" id="btn-whatsapp" class="link-card">
                    <span class="btn-content">
                        <span class="icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24">
                                <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0 0 12.04 2zm.01 1.67c2.2 0 4.26.86 5.82 2.42a8.225 8.225 0 0 1 2.41 5.83c0 4.54-3.7 8.23-8.24 8.23-1.48 0-2.93-.39-4.19-1.15l-.3-.17-3.12.82.83-3.04-.19-.3a8.132 8.132 0 0 1-1.26-4.38c.01-4.54 3.7-8.24 8.24-8.24zm-1.57 3.05c-.25 0-.46.04-.64.12-.17.07-.35.19-.51.34-.33.31-.69.87-.69 1.83 0 1.01.44 2.14 1.13 3.14 1.05 1.51 2.5 2.67 3.86 3.32.48.23.95.39 1.39.47.45.09.91.08 1.27-.01.44-.11.88-.38 1.16-.76.28-.38.38-.85.34-1.22l-.02-.2c-.04-.15-.17-.23-.42-.35l-1.68-.83c-.24-.12-.4-.14-.56-.02-.17.13-.34.34-.49.52-.16.19-.33.4-.49.4-.17 0-.44-.11-.84-.28-.85-.36-1.55-.95-2.07-1.66-.2-.28-.3-.52-.3-.72 0-.23.1-.42.27-.61.16-.18.35-.42.53-.63.17-.21.23-.36.23-.53 0-.17-.09-.42-.23-.7l-.83-1.68c-.12-.25-.26-.39-.51-.39z"/>
                            </svg>
                        </span>
                        <span>WhatsApp</span>
                    </span>
                </a>
                <a href="#" id="btn-tiktok" class="link-card">
                    <span class="btn-content">
                        <span class="icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24">
                                <path d="M12.525.02c1.31 0 2.57.31 3.7.86.08.04.15.08.22.13.4.25.77.56 1.1.92.12.13.23.26.34.4.4.52.73 1.1 1 1.72.01.03.02.06.03.1.2.45.34.92.43 1.41l.03.16c.03.22.04.45.04.68 0 .15-.01.29-.02.44 0 0 0 .01 0 .01-.2 1.44-.9 2.69-1.92 3.56-.11.1-.22.18-.33.27a6.38 6.38 0 0 1-1.3.82l-.12.06c-.19.08-.38.16-.58.23-.27.09-.55.16-.83.21l-.16.03a6.52 6.52 0 0 1-.9.06H13v3.91c0 .01 0 .02 0 .03 0 1.94-1.57 3.51-3.51 3.51-1.94 0-3.51-1.57-3.51-3.51 0-1.94 1.57-3.51 3.51-3.51.19 0 .37.01.55.04V11.2a6.765 6.765 0 0 0-6.75 6.75C3.3 21.2 6.55 24 10 24c3.45 0 6.25-2.8 6.25-6.25v-8.41a9.544 9.544 0 0 0 5.48-1.74l-.01-3.14a6.41 6.41 0 0 1-5.71 1.79V0h-3.48z"/>
                            </svg>
                        </span>
                        <span>TikTok</span>
                    </span>
                </a>
            </div>
            <div class="footer">
                © R&S Makeup
            </div>
            
            <!-- Link discreto para admin (opcional) -->
            <a href="admin.html" style="position:fixed; bottom:10px; right:10px; opacity:0.1; font-size:10px; text-decoration:none; color:inherit;">Admin</a>
        </div>
    </div>
    <!-- Script para carregar os links dinamicamente -->
    <script>
        function loadLinks() {
            const wpp = localStorage.getItem('rs_wpp') || '5531999999999';
            const store = localStorage.getItem('rs_store_link') || '#';
            const tiktok = localStorage.getItem('rs_tiktok_link') || '#';
            const btnWpp = document.getElementById('btn-whatsapp');
            const btnStore = document.getElementById('btn-loja');
            const btnTiktok = document.getElementById('btn-tiktok');
            if (btnWpp) {
                const cleanWpp = wpp.replace(/\D/g,'');
                const msg = encodeURIComponent('Olá! Gostaria de saber mais sobre a R&S Makeup.');
                btnWpp.href = `https://wa.me/${cleanWpp}?text=${msg}`;
            }
            if (btnStore) btnStore.href = store;
            if (btnTiktok) btnTiktok.href = tiktok;
        }
        document.addEventListener('DOMContentLoaded', loadLinks);
    </script>
    <!-- Unicorn Studio Script -->
    <script type="text/javascript">
    !function(){
    var u=window.UnicornStudio;
    if(u&&u.init){
    if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",function(){u.init()})
    }else{u.init()}
    }else{
    window.UnicornStudio={isInitialized:!1};
    var i=document.createElement("script");
    i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.9/dist/unicornStudio.umd.js",
    i.onload=function(){
    if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})
    }else{UnicornStudio.init()}
    },
    (document.head||document.body).appendChild(i)
    }}();
    </script>
</body>
</html>
