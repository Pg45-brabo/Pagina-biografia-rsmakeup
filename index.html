<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&S Makeup | Link in Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #f4d9d4;
            --gold: #d4af37; 
            --gold-light: #f9e498;
            --gold-dark: #b8860b;
            --black: #1a1a1a;
        }
        body {
            background-color: var(--blush);
            font-family: 'Montserrat', sans-serif;
            color: var(--black);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Container de Animação Unicorn Studio */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: -2;
            width: 100%;
            height: 100vh;
        }
        /* Overlay para legibilidade */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(244, 217, 212, 0.45);
            backdrop-filter: blur(3px);
        }
        .serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .main-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 60px 24px;
            text-align: center;
        }
        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 35px rgba(0,0,0,0.06);
            padding: 10px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .logo-container img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 50%;
        }
        .brand-name {
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .bio {
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 48px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        /* Botão Beauty Luxury (Blush & Gold) com Brilho Giratório */
        .link-card {
            position: relative;
            padding: 16px 20px;
            border-radius: 999px;
            text-decoration: none;
            color: #FFFFFF;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #C9A96E; /* Fundo base ouro para o brilho */
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            overflow: hidden;
            border: none;
        }
        /* O brilho giratório dourado */
        .link-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                transparent, 
                rgba(255, 255, 255, 0.8), /* Luz branca metálica */
                transparent,
                transparent
            );
            animation: rotate 4s linear infinite;
            z-index: 1;
        }
        /* O fundo Blush Pink (cobre o centro do brilho) */
        .link-card::after {
            content: '';
            position: absolute;
            inset: 2px; /* Margem para o brilho aparecer na borda */
            background: #D8B4A0;
            border-radius: 999px;
            z-index: 2;
            transition: background 0.3s ease;
        }
        .btn-content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 40px;
        }
        .icon-box {
            position: absolute;
            left: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-svg {
            fill: #FFFFFF;
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }
        @keyframes pulse-gold {
            0% { transform: scale(0.98); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0; }
            100% { transform: scale(0.98); opacity: 0; }
        }
        .link-card:active {
            transform: scale(0.98);
        }
        .gold-accent {
            color: #C9A96E;
        }
        .footer {
            margin-top: 60px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.5;
            padding-bottom: 40px;
        }
        @media (min-width: 768px) {
            .link-card:hover {
                transform: translateY(-4px) scale(1.02);
                box-shadow: 0 12px 30px rgba(201, 169, 110, 0.25);
                background: #e2c0ad;
            }
            .link-card:hover::after {
                background: #e2c0ad;
            }
            .link-card:hover .icon-svg {
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body>
    <!-- Camada de Animação Unicorn Studio -->
    <div id="bg-container">
        <div style="width: 100%; height: 100%;" data-us-project="uMMAALLJEry69MoLqdJS"></div>
    </div>
    <!-- Overlay de Legibilidade -->
    <div class="bg-overlay"></div>
    <!-- Conteúdo Principal -->
    <div class="main-wrapper">
        <div class="container">
            
            <div class="logo-container">
                <img src="https://i.postimg.cc/rmd8bnBB/LOGO-RS-MAKEUP.png" alt="R&S Makeup Logo">
            </div>
            <h1 class="brand-name serif">R&S Makeup</h1>
            <p class="bio">Beleza simples. Resultado elegante <span class="gold-accent">✨</span></p>
            <!-- Secção de Links -->
            <div class="links-wrapper">
                
                <a href="#" id="btn-loja" class="link-card">
                    <span class="btn-content">
                        <span class="icon-box">
                            <svg class="icon-svg" viewBox="0 0 576 512">
                                <path d="M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z"/>
                            </svg>
                        </span>
                        <span>Loja / Catálogo</span>
                    </span>
                </a>
                <a href="#" id="btn-whatsapp" class="link-card">
                    <span class="btn-content">
                        <span class="icon-box">
                            <svg class="icon-svg" viewBox="0 0 448 512">
                                <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.5-9.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                            </svg>
                        </span>
                        <span>WhatsApp</span>
                    </span>
                </a>
                <a href="#" id="btn-tiktok" class="link-card">
                    <span class="btn-content">
                        <span class="icon-box">
                            <svg class="icon-svg" viewBox="0 0 448 512">
                                <path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.32c7.87,33.32,27.31,62.33,55.11,82.47a120.4,120.4,0,0,0,65.8,19.34V209.91Z"/>
                            </svg>
                        </span>
                        <span>TikTok</span>
                    </span>
                </a>
            </div>
            <div class="footer">
                © R&S Makeup
            </div>
            
            <!-- Link discreto para admin (opcional) -->
            <a href="admin.html" style="position:fixed; bottom:10px; right:10px; opacity:0.1; font-size:10px; text-decoration:none; color:inherit;">Admin</a>
        </div>
    </div>
    <!-- Script para carregar os links dinamicamente -->
    <script>
        function loadLinks() {
            const wpp = localStorage.getItem('rs_wpp') || '5531999999999';
            const store = localStorage.getItem('rs_store_link') || '#';
            const tiktok = localStorage.getItem('rs_tiktok_link') || '#';
            const btnWpp = document.getElementById('btn-whatsapp');
            const btnStore = document.getElementById('btn-loja');
            const btnTiktok = document.getElementById('btn-tiktok');
            if (btnWpp) {
                const cleanWpp = wpp.replace(/\D/g,'');
                const msg = encodeURIComponent('Olá! Gostaria de saber mais sobre a R&S Makeup.');
                btnWpp.href = `https://wa.me/${cleanWpp}?text=${msg}`;
            }
            if (btnStore) btnStore.href = store;
            if (btnTiktok) btnTiktok.href = tiktok;
        }
        document.addEventListener('DOMContentLoaded', loadLinks);
    </script>
    <!-- Unicorn Studio Script -->
    <script type="text/javascript">
    !function(){
    var u=window.UnicornStudio;
    if(u&&u.init){
    if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",function(){u.init()})
    }else{u.init()}
    }else{
    window.UnicornStudio={isInitialized:!1};
    var i=document.createElement("script");
    i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.9/dist/unicornStudio.umd.js",
    i.onload=function(){
    if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})
    }else{UnicornStudio.init()}
    },
    (document.head||document.body).appendChild(i)
    }}();
    </script>
</body>
</html>
